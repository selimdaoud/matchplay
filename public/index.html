<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matchplay Live</title>
  <style>
    :root {
      --bg: #f6f7f5;
      --card: #ffffff;
      --text: #172018;
      --muted: #6b746b;
      --line: #e5e9e3;
      --accent: #1f6f4a;
      --accent-soft: #e9f3ee;
      --danger: #a33a32;
      --danger-soft: #f7e9e7;
      --neutral: #eef0ed;
      --shadow: 0 10px 30px rgba(25, 35, 25, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 22px 14px 42px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      letter-spacing: -0.05em;
      line-height: 0.98;
    }

    .subtitle {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 22px;
    }

    button, input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
    }

    button:active { transform: scale(0.98); }
    button:disabled { cursor: not-allowed; opacity: .55; }

    .btn {
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 650;
      font-size: 14px;
    }

    .btn.primary {
      background: var(--text);
      color: white;
      border-color: var(--text);
    }

    .btn.subtle {
      color: var(--muted);
    }

    .matches {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      overflow: hidden;
    }

    .match-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 16px;
    }

    .match-title {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }

    .players {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 7px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .players span:nth-child(2) {
      color: var(--muted);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0;
    }

    .scorebox {
      text-align: right;
    }

    .current-score {
      font-size: clamp(30px, 6vw, 48px);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -0.06em;
    }

    .status {
      margin-top: 7px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 650;
    }

    .edit-names {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 14px 0 16px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px 12px;
      background: #fbfcfb;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }

    input:focus {
      border-color: rgba(31, 111, 74, .55);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .entry {
      border-radius: 18px;
      background: #fafbf9;
      border: 1px solid var(--line);
      padding: 14px;
      margin-bottom: 16px;
    }

    .entry-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .hole-label {
      font-size: 15px;
      font-weight: 850;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .choice {
      min-height: 56px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      font-weight: 850;
      line-height: 1.15;
    }

    .choice small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 600;
    }

    .choice.win {
      background: var(--accent-soft);
      border-color: rgba(31, 111, 74, .24);
      color: var(--accent);
    }

    .choice.loss {
      background: var(--danger-soft);
      border-color: rgba(163, 58, 50, .22);
      color: var(--danger);
    }

    .choice.halve {
      background: var(--neutral);
    }

    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin: 14px 0 9px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .history-wrap {
      overflow-x: auto;
      padding-bottom: 4px;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 100%;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 9px;
      text-align: center;
      white-space: nowrap;
    }

    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background: var(--card);
      text-align: left;
      font-weight: 850;
      color: var(--muted);
      z-index: 1;
    }

    th {
      color: var(--muted);
      font-weight: 750;
    }

    td.result-cell.editable {
      cursor: pointer;
      border-radius: 12px;
    }

    td.result-cell.editable:hover {
      background: #f3f6f2;
    }

    .mark {
      display: inline-flex;
      min-width: 32px;
      justify-content: center;
      padding: 5px 7px;
      border-radius: 999px;
      font-weight: 850;
    }

    .mark.win { background: var(--accent-soft); color: var(--accent); }
    .mark.loss { background: var(--danger-soft); color: var(--danger); }
    .mark.halve { background: var(--neutral); color: var(--text); }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 12px 0;
    }

    .footer-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 14px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(10, 16, 10, .36);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 10;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(460px, 100%);
      background: white;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0,0,0,.22);
      padding: 18px;
    }

    .modal h2 {
      margin: 0 0 6px;
      letter-spacing: -0.04em;
    }

    .modal p {
      margin: 0 0 14px;
      color: var(--muted);
    }

    @media (max-width: 820px) {
      .matches { grid-template-columns: 1fr; }
      header { flex-direction: column; }
      .scorebox { text-align: left; }
      .match-head { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      /* Safe area pour les téléphones avec encoche/barre home */
      .page {
        padding: 16px 10px calc(32px + env(safe-area-inset-bottom));
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }
      .card { padding: 14px; border-radius: 18px; }
      .edit-names { grid-template-columns: 1fr; }

      /* Boutons win/halve/loss empilés verticalement, plus hauts pour les doigts */
      .choice-grid { grid-template-columns: 1fr; }
      .choice { min-height: 64px; font-size: 16px; }

      /* Évite le zoom automatique iOS sur les inputs (font-size < 16px déclenche le zoom) */
      input { font-size: 16px; }

      /* Cellules de l'historique plus hautes pour faciliter le tap */
      th, td { padding: 14px 9px; }

      /* Toolbar empilée sur une colonne */
      .toolbar { flex-direction: column; }
      .toolbar .btn, .toolbar a.btn { width: 100%; text-align: center; padding: 14px; }

      /* Modal occupe toute la largeur sur mobile */
      .modal { border-radius: 18px 18px 0 0; position: fixed; bottom: 0; left: 0; right: 0; width: 100%; }
      .modal-backdrop { align-items: flex-end; padding: 0; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>Matchplay Live</h1>
        <div class="subtitle" id="subtitle">Saisie trou par trou, score cumulé calculé automatiquement.</div>
      </div>
      <div class="pill" id="modePill">Mode saisie</div>
    </header>

    <div class="toolbar" id="toolbar">
      <a class="btn primary" href="live" target="_blank" rel="noopener" style="text-decoration:none">Ouvrir le live</a>
      <button class="btn subtle" id="copyLiveLink">Copier le lien live</button>
      <button class="btn subtle" id="resetAll">Reset all</button>
    </div>

    <section class="matches" id="matches"></section>
  </main>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">Corriger le trou</h2>
      <p id="modalText"></p>
      <div class="choice-grid" id="modalChoices"></div>
      <div class="footer-actions">
        <button class="btn subtle" id="deleteHole">Supprimer le trou</button>
        <button class="btn" id="closeModal">Fermer</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
